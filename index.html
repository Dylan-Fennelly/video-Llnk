<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Embed</title>

<style>

body
{
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
    font-family: Arial, sans-serif;
    padding: 24px;
    box-sizing: border-box;
}

.container
{
    width: min(95vw, 1100px);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.player-shell
{
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
}

.player-shell iframe
{
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
}

.meta
{
    color: #fff;
    font-size: 14px;
    opacity: 0.9;
    word-break: break-word;
}

.error
{
    color: white;
    font-size: 16px;
    line-height: 1.5;
    max-width: 800px;
}

code
{
    background: rgba(255, 255, 255, 0.08);
    padding: 2px 6px;
    border-radius: 6px;
}

</style>
</head>

<body>

<div id="app" class="container"></div>

<script>

function getYouTubeVideoId(videoUrl)
{
    try
    {
        const url = new URL(videoUrl);

        if (url.hostname === "youtu.be" || url.hostname === "www.youtu.be")
        {
            return url.pathname.replace("/", "").trim();
        }

        if (
            url.hostname === "youtube.com"
            || url.hostname === "www.youtube.com"
            || url.hostname === "m.youtube.com"
        )
        {
            const watchId = url.searchParams.get("v");

            if (watchId)
            {
                return watchId.trim();
            }

            const pathParts = url.pathname.split("/").filter(Boolean);

            if (pathParts.length >= 2 && pathParts[0] === "embed")
            {
                return pathParts[1].trim();
            }

            if (pathParts.length >= 2 && pathParts[0] === "shorts")
            {
                return pathParts[1].trim();
            }
        }

        return null;
    }
    catch
    {
        return null;
    }
}

const params = new URLSearchParams(window.location.search);
const rawVideoUrl = params.get("video");
const app = document.getElementById("app");

if (!rawVideoUrl)
{
    app.innerHTML = `
        <div class="error">
            Missing <code>video</code> query parameter.
            <br><br>
            Example:
            <br>
            <code>?video=https://youtu.be/m5ra-w1xct8?si=HfppGQAvxOPXXx5-</code>
        </div>
    `;
}
else
{
    const decodedVideoUrl = decodeURIComponent(rawVideoUrl);
    const videoId = getYouTubeVideoId(decodedVideoUrl);

    if (!videoId)
    {
        app.innerHTML = `
            <div class="error">
                Could not extract a valid YouTube video ID from:
                <br><br>
                <code>${decodedVideoUrl}</code>
            </div>
        `;
    }
    else
    {
        const embedUrl = "https://www.youtube.com/embed/" + videoId + "?autoplay=0&rel=0&modestbranding=1";

        app.innerHTML = `
            <div class="player-shell">
                <iframe
                    src="${embedUrl}"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="meta">
                Source URL: ${decodedVideoUrl}
            </div>
        `;
    }
}

</script>

</body>
</html>
